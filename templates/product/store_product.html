<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekart | addproduct</title>
</head>

<body>
    <h1 align="center">Add Product</h1>

    <form method="post">

        {% csrf_token %}

        <table align="center" cellspacing="50px">
            <tr>
                <td><strong>Name</strong></td>
                <td><input type="text" name="pname" id=""></td>
            </tr>
            <tr>
                <td><strong>price</strong></td>
                <td><input type="number" name="price" id=""></td>
            </tr>
            <tr>
                <td><strong>Quantity</strong></td>
                <td><input type="number" name="qty" id=""></td>
            </tr>
            <tr>
                <td><strong>Category</strong></td>
                <td><select name="cat" id="">
                    <option value="1">Mobiles</option>
                    <option value="2">Shoes</option>
                    <option value="3">Cloths</option>
                </select></td>
            </tr>
            <tr>
                <td><strong>Is Availabale</strong></td>
                <td>
                    <input type="radio" value="1" name="avail" id="">Yes
                    <input type="radio" value="0" name="avail" id="">No
                </td>
            </tr>
            <tr>
                <td><input type="submit" value="add product"></td>
            </tr>
        </table>
    </form>

<a href="/productapp/productdash"><button>Back</button></a>

</body>

</html>
